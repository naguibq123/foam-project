<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشروع الرغوة - الصروح الدولية</title>
    <style>
        /* هنا تضع "الأشكال والحاجات" باستخدام CSS */
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; text-align: center; }
        .box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px; margin: 50px auto;
        }
        h1 { color: #007bff; }
    </style>
</head>
<body>

    <div class="box">
        <h1>مرحباً بك</h1>
        <p>هذا هو مشروع عزل الفوم الخاص بنا</p>
        <button style="background: green; color: white; border: none; padding: 10px 20px; border-radius: 5px;">تواصل معنا</button>
    </div>

</body>
</html>
